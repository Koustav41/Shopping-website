<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Your Family Store</title>
    <!-- website icon -->
     <link rel="website icon" type="jpg" href="https://cdn-icons-png.flaticon.com/512/10423/10423381.png">
    
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Custom premium styles -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Central theme loader (immediate execution prevents FOUT) -->
    <script src="theme.js"></script>
</head>
<body class="auth-bg">

    <!-- Sticky Glass Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container">
            <a class="brand-logo" href="index.html">
                <i class="fa-solid fa-laptop-code"></i> Your Family Store
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom" href="index.html">
                            <i class="fa-solid fa-shop me-1"></i> Products
                        </a>
                    </li>
                    <li>
                        <button id="theme-toggle" class="theme-btn" type="button" aria-label="Toggle theme">
                            <i class="fas fa-sun"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Signup Area -->
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="auth-card-premium shadow">
                    <h3 class="auth-title text-center">Create Account</h3>
                    <p class="auth-subtitle text-center">Join our store and unlock extra discount perks.</p>
                    
                    <form id="signup-form">
                        <div class="floating-input-group">
                            <label for="signupName" class="floating-label"><i class="fa-solid fa-user me-1"></i> Full Name</label>
                            <input type="text" class="form-control auth-input" id="signupName" placeholder="John Doe" required autocomplete="name">
                        </div>
                        <div class="floating-input-group">
                            <label for="signupEmail" class="floating-label"><i class="fa-solid fa-envelope me-1"></i> Email address</label>
                            <input type="email" class="form-control auth-input" id="signupEmail" placeholder="name@example.com" required autocomplete="username">
                        </div>
                        <div class="floating-input-group">
                            <label for="signupPassword" class="floating-label"><i class="fa-solid fa-lock me-1"></i> Password</label>
                            <input type="password" class="form-control auth-input" id="signupPassword" placeholder="••••••••" required autocomplete="new-password">
                        </div>
                         <div class="floating-input-group">
                            <label for="confirmpassword" class="floating-label"><i class="fa-solid fa-circle-check me-1"></i> Confirm Password</label>
                            <input type="password" class="form-control auth-input" id="confirmpassword" placeholder="••••••••" required autocomplete="new-password">
                        </div>
                        <button type="submit" class="btn-submit-auth mt-2"><i class="fa-solid fa-user-plus me-2"></i>Sign Up</button>
                    </form>
                    
                    <div class="mt-4 text-center text-muted small">
                        Already have an account? <a href="login.html" class="auth-switch-link">Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Sleek Custom Toast Container -->
    <div class="custom-toast-container" id="toast-alerts-box"></div>

    <footer class="footer-custom py-5 mt-auto">
        <div class="container text-center small text-muted">
            &copy; 2026 Your Family Store. SECURE TRANSACTION HANDLER.
        </div>
    </footer>

    <!-- Bootstrap Bundle with Popper JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="signup.js"></script>
</body>
</html>
